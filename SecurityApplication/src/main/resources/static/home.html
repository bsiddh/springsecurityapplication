<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f1f5f9; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #1e293b;
        }
        header .logo { font-size: 1.4rem; font-weight: bold; color: #38bdf8; }
        nav a {
            color: #cbd5e1;
            text-decoration: none;
            margin-left: 25px;
            font-size: 0.95rem;
        }
        nav a:hover { color: #38bdf8; }

        .hero {
            text-align: center;
            padding: 100px 20px;
        }
        .hero h1 { font-size: 2.8rem; color: #38bdf8; margin-bottom: 15px; }
        .hero p { color: #cbd5e1; font-size: 1.1rem; margin-bottom: 30px; }
        .btn {
            padding: 12px 28px;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
            flex-wrap: wrap;
        }
        .feature-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 30px;
            width: 250px;
            text-align: center;
        }
        .feature-card h3 { color: #38bdf8; margin-bottom: 10px; }
        .feature-card p { color: #cbd5e1; font-size: 0.9rem; }

        footer {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">MySite</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Welcome Home</h1>
    <p>Everything you need, all in one place.</p>
    <a href="#" class="btn">Get Started</a>
</section>

<section class="features">
    <div class="feature-card">
        <h3>Fast</h3>
        <p>Built for speed and performance.</p>
    </div>
    <div class="feature-card">
        <h3>Secure</h3>
        <p>Your data is safe with us.</p>
    </div>
    <div class="feature-card">
        <h3>Simple</h3>
        <p>Clean and easy to use.</p>
    </div>
</section>

<footer>
    &copy; 2026 MySite. All rights reserved.
</footer>

</body>
</html>
